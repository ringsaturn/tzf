syntax = "proto3";

// # tzf's protobuf define
// The published data of [tzf-dist](https://github.com/ringsaturn/tzf-dist) are
// defined in this directory.
//
// Available docs:
//
// - [`tzf.v1` on buf.build](https://buf.build/ringsaturn/tzf/docs/main:tzf.v1)
// - [Plain HTML](https://ringsaturn.github.io/tzf/pb.html)
//
// Related projects:
//
// - [tzf](https://github.com/ringsaturn/tzf)
// - [tzf-dist](https://github.com/ringsaturn/tzf-dist)
// - [tzf-rs](https://github.com/ringsaturn/tzf-rs)
// - [tzfpy](https://github.com/ringsaturn/tzfpy)
// - [tzf-wasm](https://github.com/ringsaturn/tzf-wasm)
// - [tzf-web](https://github.com/ringsaturn/tzf-web)
//
package tzf.v1;

option go_package = "github.com/ringsaturn/tzf/gen/go/tzf/v1;v1";

// Basic point data define.
message Point {
  float lng = 1;
  float lat = 2;
}

// Define a polygon, mostly based on GeoJSON's Polygon define.
//
// Excerpt from RFC-9476 section 'Polygon'
//
//   -  A linear ring is a closed LineString with four or more positions.
//   -  The first and last positions are equivalent, and they MUST contain
//     identical values; their representation SHOULD also be identical.
//   -  A linear ring is the boundary of a surface or the boundary of a
//     hole in a surface.
//   -  A linear ring MUST follow the right-hand rule with respect to the
//     area it bounds, i.e., exterior rings are counterclockwise, and
//     holes are clockwise.
//
//   Note: the [GJ2008] specification did not discuss linear ring winding
//   order.  For backwards compatibility, parsers SHOULD NOT reject
//   Polygons that do not follow the right-hand rule.
//
//   Though a linear ring is not explicitly represented as a GeoJSON
//   geometry type, it leads to a canonical formulation of the Polygon
//   geometry type definition as follows:
//
//   -  For type "Polygon", the "coordinates" member MUST be an array of
//     linear ring coordinate arrays.
//   -  For Polygons with more than one of these rings, the first MUST be
//     the exterior ring, and any others MUST be interior rings.  The
//     exterior ring bounds the surface, and the interior rings (if
//     present) bound holes within the surface.
//
// [GJ2008]: https://geojson.org/geojson-spec
//
message Polygon {
  repeated Point points = 1; // define the "exterior ring"
  repeated Polygon holes = 2; // define the "interior rings" as holes
}

// Timezone is a timezone's all data.
message Timezone {
  repeated Polygon polygons = 1;
  string name = 2;
}

message Timezones {
  repeated Timezone timezones = 1;
  bool reduced = 2; // Reduced data will toggle neighbor search as plan b
  string version = 3;
}

enum CompressMethod {
  COMPRESS_METHOD_UNSPECIFIED = 0;
  COMPRESS_METHOD_POLYLINE = 1; // https://developers.google.com/maps/documentation/utilities/polylinealgorithm
}

message CompressedPolygon {
  bytes points = 1;
  repeated CompressedPolygon holes = 2;
}

// CompressedTimezonesItem designed for binary file as small as possible.
message CompressedTimezone {
  repeated CompressedPolygon data = 1;
  string name = 2;
}

message CompressedTimezones {
  CompressMethod method = 1;
  repeated CompressedTimezone timezones = 2;
  string version = 3;
}

// PreindexTimezone tile item.
//
// The X/Y/Z are OSM style like map tile index values.
message PreindexTimezone {
  string name = 1;
  int32 x = 2;
  int32 y = 3;
  int32 z = 4;
}

// PreindexTimezones is all preindex timezone's dumps.
message PreindexTimezones {
  int32 idx_zoom = 1; // which zoom value the tiles generated
  int32 agg_zoom = 2; // which zoom value the tiles merge up with.
  repeated PreindexTimezone keys = 3;
  string version = 4;
}

// Wrapper for a sequence of inline points used inside a RingSegment oneof.
// (proto3 does not allow repeated fields directly in a oneof.)
message InlinePoints {
  repeated Point points = 1;
}

// A ring segment: either inline points or a reference to a shared edge.
// Shared edges are stored once in TopoTimezones.shared_edges and referenced
// by their index; edge_reversed references the same edge but traversed in
// the opposite direction.
message RingSegment {
  oneof content {
    InlinePoints inline = 1;
    int32 edge_forward = 2; // index into TopoTimezones.shared_edges (canonical direction)
    int32 edge_reversed = 3; // index into TopoTimezones.shared_edges (reversed direction)
  }
}

// A timezone polygon in topology format.
// The exterior ring is represented as an ordered sequence of segments.
// Holes are nested TopoPolygons.
message TopoPolygon {
  repeated RingSegment exterior = 1;
  repeated TopoPolygon holes = 2;
}

// A timezone in topology format.
message TopoTimezone {
  repeated TopoPolygon polygons = 1;
  string name = 2;
}

// A shared boundary edge stored once in the global edge library.
// Rings reference it by index (forward or reversed) instead of repeating
// the point sequence.
message SharedEdge {
  int32 id = 1;
  repeated Point points = 2;
}

// Timezones in topology format with shared-edge deduplication.
// Shared timezone boundaries are stored exactly once in shared_edges;
// rings reference them by ID rather than duplicating the point sequences.
// This format targets full-precision data where ~52% of boundary edges are
// shared, reducing the 96 MB full dataset by ~30–35 MB.
message TopoTimezones {
  repeated SharedEdge shared_edges = 1;
  repeated TopoTimezone timezones = 2;
  string version = 3;
}

// CompressedSharedEdge stores a shared boundary edge with its point sequence
// polyline-encoded (delta + zigzag, same algorithm as CompressedPolygon).
message CompressedSharedEdge {
  int32 id = 1;
  bytes points = 2; // polyline-encoded point sequence
}

// CompressedInlinePoints stores a short inline ring segment as polyline bytes.
message CompressedInlinePoints {
  bytes points = 1; // polyline-encoded point sequence
}

// CompressedRingSegment mirrors RingSegment with polyline-encoded inline points.
message CompressedRingSegment {
  oneof content {
    CompressedInlinePoints inline = 1;
    int32 edge_forward = 2;
    int32 edge_reversed = 3;
  }
}

// CompressedTopoPolygon mirrors TopoPolygon with compressed ring segments.
message CompressedTopoPolygon {
  repeated CompressedRingSegment exterior = 1;
  repeated CompressedTopoPolygon holes = 2;
}

// CompressedTopoTimezone mirrors TopoTimezone with compressed polygons.
message CompressedTopoTimezone {
  repeated CompressedTopoPolygon polygons = 1;
  string name = 2;
}

// CompressedTopoTimezones combines shared-edge deduplication with polyline
// coordinate compression. Shared edge point sequences and inline segments are
// stored as polyline bytes instead of repeated Point messages, significantly
// reducing file size on top of the deduplication savings.
message CompressedTopoTimezones {
  CompressMethod method = 1;
  repeated CompressedSharedEdge shared_edges = 2;
  repeated CompressedTopoTimezone timezones = 3;
  string version = 4;
}
