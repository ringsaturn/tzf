name: build-tzpb

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      timezone-boundary-version:
        description: "Timezone boundary version to use (leave empty to fetch latest)"
        required: false
        default: ""

jobs:
  build-tzpb-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Fetch latest timezone-boundary-builder version
        id: fetch-version
        run: |
          if [ -n "${{ inputs.timezone-boundary-version }}" ]; then
            VERSION="${{ inputs.timezone-boundary-version }}"
          else
            VERSION=$(curl -sf "https://api.github.com/repos/evansiroky/timezone-boundary-builder/tags" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['name'] if d else '')")
            if [ -z "$VERSION" ]; then
              echo "Failed to fetch latest TBB version"
              exit 1
            fi
          fi
          echo "TIMEZONE_BOUNDARY_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TIMEZONE_BOUNDARY_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download timezone boundary data
        run: |
          wget "https://github.com/evansiroky/timezone-boundary-builder/releases/download/$TIMEZONE_BOUNDARY_VERSION/timezones-with-oceans.geojson.zip"
          unzip timezones-with-oceans.geojson.zip

      - name: Install CLI tools from local source
        run: |
          go install ./cmd/geojson2tzpb
          go install ./cmd/reducetzpb
          go install ./cmd/deduplicatetzpb
          go install ./cmd/compresstopotzpb
          go install ./cmd/preindextzpb

      - name: Generate binary files
        run: |
          geojson2tzpb combined-with-oceans.json

          # combined-with-oceans.compress.topo.bin: dedup + compress on full precision data
          deduplicatetzpb -o combined-with-oceans.topo.bin combined-with-oceans.bin \
            2> >(tee /tmp/stats-dedup-full.txt >&2)
          compresstopotzpb -o combined-with-oceans.compress.topo.bin combined-with-oceans.topo.bin \
            2> >(tee /tmp/stats-compress-full.txt >&2)

          # combined-with-oceans.topology.compress.topo.bin: topology-aware simplify + dedup + compress
          # combined-with-oceans.topology.preindex.bin:      topology-aware simplify + tile pre-index
          reducetzpb -o combined-with-oceans.topology.bin combined-with-oceans.bin \
            2> >(tee /tmp/stats-reduce-topo.txt >&2)
          deduplicatetzpb -o combined-with-oceans.topology.topo.bin combined-with-oceans.topology.bin \
            2> >(tee /tmp/stats-dedup-topo.txt >&2)
          compresstopotzpb -o combined-with-oceans.topology.compress.topo.bin combined-with-oceans.topology.topo.bin \
            2> >(tee /tmp/stats-compress-topo.txt >&2)
          preindextzpb combined-with-oceans.topology.bin \
            2> >(tee /tmp/stats-preindex.txt >&2)

          ls -alh combined-with-oceans*.bin

      - name: Collect checksums
        run: |
          md5sum \
            combined-with-oceans.compress.topo.bin \
            combined-with-oceans.topology.compress.topo.bin \
            combined-with-oceans.topology.preindex.bin \
            > checksums.md5
          cat checksums.md5

      - uses: actions/upload-artifact@v7
        with:
          name: tzpb-${{ steps.fetch-version.outputs.TIMEZONE_BOUNDARY_VERSION }}
          path: |
            combined-with-oceans.compress.topo.bin
            combined-with-oceans.topology.compress.topo.bin
            combined-with-oceans.topology.preindex.bin
            checksums.md5
